<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VI Microsystems – Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0B1B3A; --navy-mid: #142454; --blue: #1A56DB; --blue-light: #3B82F6;
    --accent: #00D4AA; --accent-dark: #00A882; --white: #FFFFFF; --off-white: #F4F7FF;
    --gray-50: #F8FAFF; --gray-100: #E8EDF5; --gray-300: #94A3B8; --gray-600: #475569;
    --gray-800: #1E293B; --text: #0F172A; --success: #10B981; --warning: #F59E0B;
    --error: #EF4444; --purple: #8B5CF6;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Syne', sans-serif; background: var(--navy); color: #fff; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
 
  /* HEADER */
  header { position: sticky; top: 0; z-index: 100; background: rgba(11,27,58,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(0,212,170,0.15); padding: 0 32px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--blue-light)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; color: #fff; }
  .header-title { font-size: 18px; font-weight: 800; color: #fff; }
  .header-title span { color: var(--accent); }
  .header-badge { background: rgba(0,212,170,0.1); border: 1px solid rgba(0,212,170,0.3); color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 100px; letter-spacing: 1px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .refresh-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 8px; padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .refresh-btn:hover { background: rgba(0,212,170,0.1); border-color: var(--accent); color: var(--accent); }
  .live-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); font-family: 'JetBrains Mono', monospace; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .back-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border-radius: 8px; padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
  .back-btn:hover { background: rgba(0,212,170,0.1); border-color: var(--accent); color: var(--accent); }
 
  /* MAIN */
  main { position: relative; z-index: 1; padding: 32px; max-width: 1400px; margin: 0 auto; }
 
  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
  .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; position: relative; overflow: hidden; transition: border-color 0.3s, background 0.3s; }
  .stat-card:hover { border-color: rgba(0,212,170,0.3); background: rgba(0,212,170,0.04); }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--accent), var(--blue-light)); opacity: 0; transition: opacity 0.3s; }
  .stat-card:hover::before { opacity: 1; }
  .stat-icon { font-size: 28px; margin-bottom: 12px; display: block; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; color: var(--accent); line-height: 1; margin-bottom: 6px; }
  .stat-label { font-size: 13px; color: rgba(255,255,255,0.45); font-weight: 600; letter-spacing: 0.5px; }
  .stat-sub { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
 
  /* FILTERS */
  .filters-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
  .filter-select, .search-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; padding: 10px 16px; font-family: 'Syne', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  .filter-select:focus, .search-input:focus { border-color: var(--accent); }
  .filter-select option { background: var(--navy); }
  .search-input { flex: 1; min-width: 200px; }
  .search-input::placeholder { color: rgba(255,255,255,0.3); }
  .filter-label { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
 
  /* TABLE */
  .table-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; }
  .table-header { padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; }
  .table-title { font-size: 16px; font-weight: 700; color: #fff; }
  .table-count { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.4); }
  table { width: 100%; border-collapse: collapse; }
  thead tr { background: rgba(255,255,255,0.03); }
  th { padding: 14px 20px; text-align: left; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.06); }
  td { padding: 16px 20px; font-size: 14px; color: rgba(255,255,255,0.8); border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.2s; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
 
  /* NAME CELL */
  .name-cell { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--accent), var(--blue-light)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .name-text { font-weight: 600; color: #fff; font-size: 14px; }
  .email-text { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
 
  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; white-space: nowrap; }
  .badge-new { background: rgba(0,212,170,0.15); color: var(--accent); border: 1px solid rgba(0,212,170,0.3); }
  .badge-read { background: rgba(59,130,246,0.15); color: var(--blue-light); border: 1px solid rgba(59,130,246,0.3); }
  .badge-replied { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  .badge-ece { background: rgba(139,92,246,0.15); color: #A78BFA; border: 1px solid rgba(139,92,246,0.3); }
  .badge-eee { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
  .badge-cse { background: rgba(0,212,170,0.15); color: var(--accent); border: 1px solid rgba(0,212,170,0.3); }
  .badge-product { background: rgba(239,68,68,0.15); color: #F87171; border: 1px solid rgba(239,68,68,0.3); }
  .badge-robot { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  .badge-network { background: rgba(59,130,246,0.15); color: var(--blue-light); border: 1px solid rgba(59,130,246,0.3); }
  .badge-rd { background: rgba(139,92,246,0.15); color: #A78BFA; border: 1px solid rgba(139,92,246,0.3); }
  .badge-other { background: rgba(148,163,184,0.15); color: var(--gray-300); border: 1px solid rgba(148,163,184,0.3); }
 
  /* DATE */
  .date-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: rgba(255,255,255,0.4); }
  .msg-preview { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(255,255,255,0.5); font-size: 13px; }
 
  /* ACTION BUTTONS */
  .action-btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Syne', sans-serif; }
  .action-btn:hover { background: rgba(0,212,170,0.1); border-color: var(--accent); color: var(--accent); }
  .action-btn.delete:hover { background: rgba(239,68,68,0.1); border-color: var(--error); color: var(--error); }
 
  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--navy-mid); border: 1px solid rgba(0,212,170,0.2); border-radius: 24px; padding: 36px; max-width: 560px; width: 100%; position: relative; animation: slideUp 0.3s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .modal-close { position: absolute; top: 16px; right: 16px; background: rgba(255,255,255,0.06); border: none; color: rgba(255,255,255,0.5); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close:hover { background: rgba(239,68,68,0.2); color: var(--error); }
  .modal-title { font-size: 20px; font-weight: 800; margin-bottom: 24px; color: #fff; }
  .modal-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
  .modal-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); letter-spacing: 1.5px; text-transform: uppercase; }
  .modal-value { font-size: 15px; color: rgba(255,255,255,0.85); line-height: 1.6; }
  .modal-value.mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .modal-msg { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.7; }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .modal-btn.primary { background: var(--accent); color: var(--navy); }
  .modal-btn.primary:hover { background: var(--accent-dark); }
  .modal-btn.secondary { background: rgba(255,255,255,0.06); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
  .modal-btn.secondary:hover { background: rgba(255,255,255,0.1); }
 
  /* EMPTY / LOADING / ERROR */
  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
  .empty-text { font-size: 16px; color: rgba(255,255,255,0.3); }
  .loading { text-align: center; padding: 60px; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,212,170,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { color: rgba(255,255,255,0.4); font-size: 14px; font-family: 'JetBrains Mono', monospace; }
  .error-state { text-align: center; padding: 60px; }
  .error-icon { font-size: 40px; margin-bottom: 12px; }
  .error-text { color: var(--error); font-size: 14px; margin-bottom: 16px; }
 
  /* TOAST */
  .toast { position: fixed; bottom: 24px; right: 24px; z-index: 300; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; transform: translateY(80px); opacity: 0; transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 16px 40px rgba(0,0,0,0.3); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); color: #fff; }
  .toast.error { background: var(--error); color: #fff; }
 
  @media (max-width: 900px) { .stats-grid { grid-template-columns: 1fr 1fr; } main { padding: 20px; } header { padding: 0 20px; } .header-title { font-size: 15px; } td, th { padding: 12px; } .msg-preview { max-width: 100px; } }
  @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr 1fr; gap: 12px; } .stat-value { font-size: 28px; } .filters-bar { flex-direction: column; align-items: stretch; } }
</style>
</head>
<body>
 
<header>
  <div class="header-left">
    <div class="logo-mark">VI</div>
    <div>
      <div class="header-title">VI Microsystems <span>Admin</span></div>
    </div>
    <div class="header-badge">DASHBOARD</div>
  </div>
  <div class="header-right">
    <a href="/index.html" class="back-btn">← Back to Site</a>
    <div class="live-indicator">
      <div class="live-dot"></div>
      LIVE
    </div>
    <button class="refresh-btn" onclick="loadSubmissions()">↻ Refresh</button>
  </div>
</header>
 
<main>
  <!-- STATS -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <span class="stat-icon">📬</span>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-label">Total Enquiries</div>
      <div class="stat-sub">all time</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🆕</span>
      <div class="stat-value" id="statNew">—</div>
      <div class="stat-label">New</div>
      <div class="stat-sub">unread</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🤖</span>
      <div class="stat-value" id="statProduct">—</div>
      <div class="stat-label">Product Enquiries</div>
      <div class="stat-sub">robots & trainers</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🎓</span>
      <div class="stat-value" id="statInternship">—</div>
      <div class="stat-label">Internship Enquiries</div>
      <div class="stat-sub">ECE / EEE / CSE</div>
    </div>
  </div>
 
  <!-- FILTERS -->
  <div class="filters-bar">
    <span class="filter-label">Filter:</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Search by name, email or message..." oninput="filterTable()" />
    <select class="filter-select" id="statusFilter" onchange="filterTable()">
      <option value="">All Status</option>
      <option value="new">New</option>
      <option value="read">Read</option>
      <option value="replied">Replied</option>
    </select>
    <select class="filter-select" id="typeFilter" onchange="filterTable()">
      <option value="">All Types</option>
      <!-- ── Product Enquiries ── -->
      <option value="6-Axis Collaborative Robot">6-Axis Cobot</option>
      <option value="ROS2 Robot — ESP32">ROS2 Robot — ESP32</option>
      <option value="ROS2 Robot — Jetson Orin Nano">ROS2 Robot — Jetson Orin</option>
      <option value="ROS2 Robot — Arduino UNO Q">ROS2 Robot — UNO Q</option>
      <option value="ViLaN-05 LAN & Cyber Security Trainer">ViLaN-05 Trainer</option>
      <option value="Product / Services Inquiry">Services Inquiry</option>
      <option value="Custom Product / R&D">Custom / R&D</option>
      <!-- ── Internship Enquiries ── -->
      <option value="ECE Internship">ECE Internship</option>
      <option value="EEE Internship">EEE Internship</option>
      <option value="CSE Internship">CSE Internship</option>
      <!-- ── Other ── -->
      <option value="R&D Consulting">R&D Consulting</option>
      <option value="Other">Other</option>
    </select>
  </div>
 
  <!-- TABLE -->
  <div class="table-container">
    <div class="table-header">
      <div class="table-title">All Submissions</div>
      <div class="table-count" id="tableCount">Loading...</div>
    </div>
    <div id="tableBody">
      <div class="loading">
        <div class="spinner"></div>
        <div class="loading-text">Fetching submissions...</div>
      </div>
    </div>
  </div>
</main>
 
<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div class="modal-title" id="modalTitle">Submission Details</div>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" id="modalStatusBtn" onclick="updateStatus()">Mark as Read</button>
      <button class="modal-btn secondary" onclick="closeModalBtn()">Close</button>
    </div>
  </div>
</div>
 
<!-- TOAST -->
<div class="toast" id="toast"><span id="toastMsg"></span></div>
 
<script>
  const API_BASE = "https://vi-microsystems.onrender.com";
  let allSubmissions = [];
  let currentId = null;
  let currentStatus = null;
 
  // ── Load Submissions ──
  async function loadSubmissions() {
    document.getElementById("tableBody").innerHTML = `<div class="loading"><div class="spinner"></div><div class="loading-text">Fetching submissions...</div></div>`;
    try {
      const res = await fetch(`${API_BASE}/api/contact?limit=200`);
      const data = await res.json();
      if (data.success) {
        allSubmissions = data.data;
        updateStats(allSubmissions);
        renderTable(allSubmissions);
      } else {
        showError("Failed to load submissions.");
      }
    } catch (err) {
      showError("Cannot connect to server. Make sure backend is running.");
    }
  }
 
  // ── Update Stats ──
  function updateStats(data) {
    document.getElementById("statTotal").textContent = data.length;
    document.getElementById("statNew").textContent = data.filter(d => d.status === "new").length;
 
    // Count product enquiries (anything NOT internship)
    const productTypes = ["6-Axis","ROS2","ViLaN","Services","Custom","R&D","Product"];
    document.getElementById("statProduct").textContent = data.filter(d =>
      productTypes.some(t => d.enquiryType.includes(t))
    ).length;
 
    // Count internship enquiries
    document.getElementById("statInternship").textContent = data.filter(d =>
      d.enquiryType.includes("Internship") || d.enquiryType.includes("ECE") ||
      d.enquiryType.includes("EEE") || d.enquiryType.includes("CSE")
    ).length;
  }
 
  // ── Render Table ──
  function renderTable(data) {
    document.getElementById("tableCount").textContent = `${data.length} submission${data.length !== 1 ? "s" : ""}`;
    if (data.length === 0) {
      document.getElementById("tableBody").innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">No submissions found</div></div>`;
      return;
    }
 
    const rows = data.map(s => {
      const initials = (s.firstName[0] + s.lastName[0]).toUpperCase();
      const date = new Date(s.createdAt).toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });
      const time = new Date(s.createdAt).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
      return `
        <tr>
          <td>
            <div class="name-cell">
              <div class="avatar">${initials}</div>
              <div>
                <div class="name-text">${s.firstName} ${s.lastName}</div>
                <div class="email-text">${s.email}</div>
              </div>
            </div>
          </td>
          <td>${getTypeBadge(s.enquiryType)}</td>
          <td><div class="msg-preview">${s.message}</div></td>
          <td>${getStatusBadge(s.status)}</td>
          <td>
            <div class="date-text">${date}</div>
            <div class="date-text" style="opacity:0.5">${time}</div>
          </td>
          <td style="display:flex;gap:6px">
            <button class="action-btn" onclick="openModal('${s._id}')">View</button>
            <button class="action-btn delete" onclick="deleteSubmission('${s._id}')">Delete</button>
          </td>
        </tr>`;
    }).join("");
 
    document.getElementById("tableBody").innerHTML = `
      <table>
        <thead><tr>
          <th>Contact</th><th>Enquiry Type</th><th>Message</th>
          <th>Status</th><th>Date</th><th>Action</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
 
  // ── Status Badge ──
  function getStatusBadge(status) {
    const map = {
      new:     `<span class="badge badge-new">🔵 New</span>`,
      read:    `<span class="badge badge-read">👁 Read</span>`,
      replied: `<span class="badge badge-replied">✅ Replied</span>`,
    };
    return map[status] || `<span class="badge badge-other">${status}</span>`;
  }
 
  // ── Type Badge — FIXED: handles ALL enquiry types ──
  function getTypeBadge(type) {
    if (!type) return `<span class="badge badge-other">Unknown</span>`;
 
    // Internship types
    if (type.includes("ECE")) return `<span class="badge badge-ece">🎓 ECE</span>`;
    if (type.includes("EEE")) return `<span class="badge badge-eee">⚡ EEE</span>`;
    if (type.includes("CSE")) return `<span class="badge badge-cse">💻 CSE</span>`;
 
    // Product types — NEW
    if (type.includes("6-Axis") || type.includes("Cobot") || type.includes("collaborative"))
      return `<span class="badge badge-product">🦾 6-Axis Cobot</span>`;
    if (type.includes("ESP32"))
      return `<span class="badge badge-robot">🤖 ROS2 ESP32</span>`;
    if (type.includes("Jetson") || type.includes("Orin"))
      return `<span class="badge badge-robot">🧠 Jetson Orin</span>`;
    if (type.includes("UNO Q") || type.includes("Arduino"))
      return `<span class="badge badge-robot">⚙️ UNO Q</span>`;
    if (type.includes("ViLaN") || type.includes("LAN") || type.includes("Cyber") || type.includes("Networking"))
      return `<span class="badge badge-network">🌐 ViLaN-05</span>`;
 
    // General types
    if (type.includes("Services") || type.includes("Product"))
      return `<span class="badge badge-read">🔧 Services</span>`;
    if (type.includes("R&D") || type.includes("Custom"))
      return `<span class="badge badge-rd">🔬 R&D</span>`;
    if (type.includes("Consulting"))
      return `<span class="badge badge-rd">💡 Consulting</span>`;
 
    // Fallback — show actual type text so nothing is hidden
    return `<span class="badge badge-other">${type}</span>`;
  }
 
  // ── Filter Table ──
  function filterTable() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;
    const type   = document.getElementById("typeFilter").value;
 
    const filtered = allSubmissions.filter(s => {
      const matchSearch = !search ||
        `${s.firstName} ${s.lastName}`.toLowerCase().includes(search) ||
        s.email.toLowerCase().includes(search) ||
        s.message.toLowerCase().includes(search) ||
        s.enquiryType.toLowerCase().includes(search);
      const matchStatus = !status || s.status === status;
      const matchType   = !type || s.enquiryType === type;
      return matchSearch && matchStatus && matchType;
    });
 
    renderTable(filtered);
  }
 
  // ── Open Modal ──
  function openModal(id) {
    const s = allSubmissions.find(s => s._id === id);
    if (!s) return;
    currentId = id;
    currentStatus = s.status;
 
    const date = new Date(s.createdAt).toLocaleString("en-IN", {
      day: "2-digit", month: "long", year: "numeric",
      hour: "2-digit", minute: "2-digit", timeZone: "Asia/Kolkata"
    });
 
    document.getElementById("modalTitle").textContent = `${s.firstName} ${s.lastName}`;
    document.getElementById("modalContent").innerHTML = `
      <div class="modal-row">
        <div class="modal-label">Email</div>
        <div class="modal-value mono">${s.email}</div>
      </div>
      <div class="modal-row">
        <div class="modal-label">Enquiry Type</div>
        <div class="modal-value">${getTypeBadge(s.enquiryType)}</div>
      </div>
      <div class="modal-row">
        <div class="modal-label">Full Enquiry Type</div>
        <div class="modal-value mono" style="font-size:12px;color:rgba(255,255,255,0.5)">${s.enquiryType}</div>
      </div>
      <div class="modal-row">
        <div class="modal-label">Status</div>
        <div class="modal-value">${getStatusBadge(s.status)}</div>
      </div>
      <div class="modal-row">
        <div class="modal-label">Submitted</div>
        <div class="modal-value mono" style="font-size:12px">${date} IST</div>
      </div>
      <div class="modal-row">
        <div class="modal-label">Message</div>
        <div class="modal-msg">${s.message}</div>
      </div>`;
 
    const btn = document.getElementById("modalStatusBtn");
    if (s.status === "new") { btn.textContent = "Mark as Read"; btn.style.display = "block"; }
    else if (s.status === "read") { btn.textContent = "Mark as Replied"; btn.style.display = "block"; }
    else { btn.style.display = "none"; }
 
    document.getElementById("modalOverlay").classList.add("open");
  }
 
  // ── Close Modal ──
  function closeModal(e) { if (e.target === document.getElementById("modalOverlay")) closeModalBtn(); }
  function closeModalBtn() { document.getElementById("modalOverlay").classList.remove("open"); currentId = null; }
 
  // ── Delete ──
  async function deleteSubmission(id) {
    if (!confirm("Are you sure you want to delete this submission?")) return;
    try {
      const res = await fetch(`${API_BASE}/api/contact/${id}`, { method: "DELETE" });
      const data = await res.json();
      if (data.success) { showToast("✅ Deleted!", "success"); loadSubmissions(); }
      else showToast("❌ Failed to delete", "error");
    } catch (err) { showToast("❌ Cannot connect to server", "error"); }
  }
 
  // ── Update Status ──
  async function updateStatus() {
    if (!currentId) return;
    const newStatus = currentStatus === "new" ? "read" : "replied";
    try {
      const res = await fetch(`${API_BASE}/api/contact/${currentId}/status`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ status: newStatus }),
      });
      const data = await res.json();
      if (data.success) { showToast(`✅ Marked as ${newStatus}!`, "success"); closeModalBtn(); loadSubmissions(); }
      else showToast("❌ Failed to update status", "error");
    } catch (err) { showToast("❌ Cannot connect to server", "error"); }
  }
 
  // ── Show Error ──
  function showError(msg) {
    document.getElementById("tableBody").innerHTML = `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-text">${msg}</div><button class="refresh-btn" onclick="loadSubmissions()" style="margin:0 auto">Try Again</button></div>`;
    document.getElementById("tableCount").textContent = "Error";
  }
 
  // ── Toast ──
  function showToast(msg, type) {
    const toast = document.getElementById("toast");
    document.getElementById("toastMsg").textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => { toast.className = "toast"; }, 3000);
  }
 
  // ── Init ──
  loadSubmissions();
  setInterval(loadSubmissions, 60000);
</script>
</body>
</html>
